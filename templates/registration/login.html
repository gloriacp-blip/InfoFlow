{% extends 'base.html' %}
{% block title %}Iniciar sesión | InfoFlow{% endblock %}
{% block content %}
<section class="card" style="max-width:480px;margin:2rem auto;">
    <h1>Iniciar sesión</h1>
    <p>Accede para crear, editar o eliminar recursos y categorías.</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Entrar</button>
    </form>
</section>
{% endblock %}
